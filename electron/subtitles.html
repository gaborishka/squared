<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Squared Subtitles</title>
    <style>
      :root {
        color-scheme: dark;
        --text: #f4f4f5;
        --muted: rgba(244, 244, 245, 0.7);
        --ok: #34d399;
        --watch: #fbbf24;
        --danger: #f87171;
      }
      * { box-sizing: border-box; margin: 0; }
      html, body {
        width: 100%; height: 100%;
        overflow: hidden; background: transparent;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        user-select: none;
        display: flex; align-items: flex-end; justify-content: center;
        padding-bottom: 8px;
      }
      .bar {
        display: none;
        width: min(980px, calc(100vw - 32px));
        gap: 10px;
        flex-direction: column;
        animation: fadeUp 0.25s ease-out;
      }
      .bar.visible { display: flex; }
      .bar.fading { opacity: 0; transition: opacity 0.6s ease-out; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .lane {
        display: none;
        text-align: center;
        padding: 12px 24px;
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.78);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      }
      .lane.visible { display: block; }

      .lane.mode-rescue { border: 1px solid rgba(248,113,113,0.35); }
      .lane.mode-directive { border: 1px solid rgba(251,191,36,0.3); }
      .lane.mode-soft_cue { border: 1px solid rgba(52,211,153,0.25); }
      .lane.mode-monitor { border: 1px solid rgba(255,255,255,0.08); }
      .lane.priority-critical { border: 1px solid rgba(249,115,22,0.35); }
      .lane.priority-watch { border: 1px solid rgba(16,185,129,0.3); }
      .lane.priority-info { border: 1px solid rgba(255,255,255,0.08); }

      .eyebrow {
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(244, 244, 245, 0.5);
        margin-bottom: 6px;
      }

      .prompt {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--text);
        line-height: 1.3;
      }
      .lane.mode-rescue .prompt { color: var(--danger); }
      .lane.mode-directive .prompt { color: var(--watch); }
      .lane.mode-soft_cue .prompt { color: var(--ok); }
      .lane.priority-critical .prompt { color: #fb923c; }
      .lane.priority-watch .prompt { color: #34d399; }

      .detail {
        display: none;
        margin-top: 6px;
        font-size: 14px;
        line-height: 1.4;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }
      .detail.visible { display: -webkit-box; }
    </style>
  </head>
  <body>
    <div id="bar" class="bar">
      <div id="delivery-lane" class="lane">
        <div class="eyebrow">Delivery agent</div>
        <div id="delivery-prompt" class="prompt"></div>
        <div id="delivery-detail" class="detail"></div>
      </div>
      <div id="audience-lane" class="lane">
        <div id="audience-label" class="eyebrow">Audience agent</div>
        <div id="audience-prompt" class="prompt"></div>
        <div id="audience-detail" class="detail"></div>
      </div>
    </div>

    <script>
      const bar = document.getElementById('bar');
      const deliveryLane = document.getElementById('delivery-lane');
      const deliveryPrompt = document.getElementById('delivery-prompt');
      const deliveryDetail = document.getElementById('delivery-detail');
      const audienceLane = document.getElementById('audience-lane');
      const audienceLabel = document.getElementById('audience-label');
      const audiencePrompt = document.getElementById('audience-prompt');
      const audienceDetail = document.getElementById('audience-detail');

      let dismissTimer = null;
      const DISMISS_MS = 8000;

      function startDismissTimer() {
        if (dismissTimer) clearTimeout(dismissTimer);
        dismissTimer = setTimeout(() => {
          bar.classList.add('fading');
          setTimeout(() => {
            bar.classList.remove('visible', 'fading');
          }, 600);
        }, DISMISS_MS);
      }

      function update(state) {
        const deliveryVisible = Boolean(state.delivery && state.delivery.visible && (state.delivery.prompt || state.delivery.detail));
        const audienceVisible = Boolean(state.audience && state.audience.visible && (state.audience.prompt || state.audience.detail));
        const shouldShow = state.visible && (deliveryVisible || audienceVisible);

        bar.classList.remove('fading');
        bar.className = 'bar' + (shouldShow ? ' visible' : '');

        deliveryLane.className = 'lane' + (deliveryVisible ? ' visible mode-' + state.delivery.mode : '');
        deliveryPrompt.textContent = state.delivery?.prompt || '';
        deliveryDetail.textContent = state.delivery?.detail || '';
        deliveryDetail.className = 'detail' + (state.delivery?.detail ? ' visible' : '');

        const audienceTone = state.audience?.captureStatus === 'lost'
          ? 'mode-rescue'
          : 'priority-' + (state.audience?.priority || 'info');
        audienceLane.className = 'lane' + (audienceVisible ? ' visible ' + audienceTone : '');
        audienceLabel.textContent = state.audience?.engagement
          ? 'Audience agent \u2022 ' + state.audience.engagement
          : 'Audience agent';
        audiencePrompt.textContent = state.audience?.prompt || '';
        audienceDetail.textContent = state.audience?.detail || '';
        audienceDetail.className = 'detail' + (state.audience?.detail ? ' visible' : '');

        if (shouldShow) {
          startDismissTimer();
        } else if (dismissTimer) {
          clearTimeout(dismissTimer);
          dismissTimer = null;
        }
      }

      if (window.squaredElectron?.onSubtitleState) {
        window.squaredElectron.onSubtitleState(update);
      }
    </script>
  </body>
</html>
