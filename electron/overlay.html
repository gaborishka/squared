<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squared Overlay</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: rgba(9, 9, 11, 0.72);
        --text: #f8fafc;
        --muted: rgba(248, 250, 252, 0.64);
        --ok: #34d399;
        --watch: #fbbf24;
        --danger: #f87171;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        padding: 18px 24px;
      }

      .shell {
        display: none;
        width: 100%;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: var(--bg);
        backdrop-filter: blur(20px);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
        color: var(--text);
        padding: 16px 18px 18px;
      }

      .shell.visible {
        display: block;
      }

      .shell.mode-monitor {
        border-color: rgba(52, 211, 153, 0.28);
      }

      .shell.mode-soft_cue,
      .shell.mode-directive {
        border-color: rgba(251, 191, 36, 0.35);
      }

      .shell.mode-rescue {
        border-color: rgba(248, 113, 113, 0.4);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .eyebrow {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--muted);
      }

      .prompt {
        margin-top: 10px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.04em;
      }

      .rescue {
        display: none;
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 18px;
        background: rgba(0, 0, 0, 0.22);
        color: rgba(248, 250, 252, 0.92);
        font-size: 14px;
        line-height: 1.45;
      }

      .rescue.visible {
        display: block;
      }

      .footer {
        margin-top: 14px;
      }

      .meter {
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
      }

      .meter-fill {
        height: 100%;
        width: 100%;
        border-radius: 999px;
        background: var(--ok);
        transition: width 180ms ease, background-color 180ms ease;
      }
    </style>
  </head>
  <body>
    <main id="shell" class="shell">
      <div class="row eyebrow">
        <span id="slide">Slide --</span>
        <span id="mode">monitor</span>
      </div>
      <div id="prompt" class="prompt">Stay steady</div>
      <div id="rescue" class="rescue"></div>
      <div class="footer">
        <div class="row eyebrow" style="margin-bottom: 8px;">
          <span>Timing</span>
          <span id="timing">No target</span>
        </div>
        <div class="meter">
          <div id="meter-fill" class="meter-fill"></div>
        </div>
      </div>
    </main>

    <script>
      const shell = document.getElementById('shell');
      const slide = document.getElementById('slide');
      const mode = document.getElementById('mode');
      const prompt = document.getElementById('prompt');
      const rescue = document.getElementById('rescue');
      const timing = document.getElementById('timing');
      const meterFill = document.getElementById('meter-fill');

      const updateState = (state) => {
        shell.className = `shell ${state.visible ? 'visible' : ''} mode-${state.mode}`;
        slide.textContent = state.currentSlide != null ? `Slide ${state.currentSlide}` : 'Slide --';
        mode.textContent = state.mode;
        prompt.textContent = state.microPrompt || 'Stay steady';
        rescue.textContent = state.rescueText || '';
        rescue.className = `rescue ${state.rescueText ? 'visible' : ''}`;
        timing.textContent = state.slideTimeRemaining != null ? `${Math.max(0, state.slideTimeRemaining)}s left` : 'No target';

        const ratio = state.slideTimeRemaining == null ? 100 : Math.max(8, Math.min(100, (state.slideTimeRemaining / 90) * 100));
        meterFill.style.width = `${ratio}%`;
        meterFill.style.background = state.mode === 'rescue'
          ? 'var(--danger)'
          : state.mode === 'directive'
            ? 'var(--watch)'
            : 'var(--ok)';
      };

      if (window.squaredElectron?.onOverlayState) {
        window.squaredElectron.onOverlayState(updateState);
      } else {
        updateState({
          visible: true,
          mode: 'monitor',
          microPrompt: 'Electron preload missing',
          rescueText: '',
          slideTimeRemaining: null,
          currentSlide: null,
        });
      }
    </script>
  </body>
</html>
