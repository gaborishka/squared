services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: squared-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: squared
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - squared_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d squared"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  squared_postgres_data:
